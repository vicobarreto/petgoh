name: Deploy to cPanel via SSH

on:
  push:
    branches:
      - main # O deploy será acionado sempre que você fizer um commit na branch 'main'

jobs:
  build-and-deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do seu repositório
      - name: 📦 Checkout do código
        uses: actions/checkout@v4

      # 2. Prepara o Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instala as dependências
      - name: 📥 Instalar dependências
        run: npm install

      # 4. Faz o build do projeto (gera a pasta 'dist')
      - name: 🏗️ Build do projeto
        run: npm run build

      # 5. Envia a pasta 'dist' via SSH (rsync)
      - name: 🔐 SSH Deploy
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: "21098"
          TARGET: ${{ secrets.REMOTE_TARGET }}
          EXCLUDE: "/node_modules/"
